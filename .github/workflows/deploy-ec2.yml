name: Deploy to EC2

on:
  push:
    branches:
      - '**'

  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Determine branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Open port 22 for this runner
        id: open-ssh
        run: |
          RUNNER_IP=$(curl -sf https://checkip.amazonaws.com)/32
          echo "runner_ip=$RUNNER_IP" >> $GITHUB_OUTPUT
          echo "  → Runner IP: $RUNNER_IP"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr $RUNNER_IP
          echo "  → Port 22 opened for $RUNNER_IP"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/incident-monitor.pem
          chmod 600 ~/.ssh/incident-monitor.pem
          printf "Host 3.141.100.21\n  StrictHostKeyChecking accept-new\n  IdentityFile ~/.ssh/incident-monitor.pem\n" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy to EC2
        run: |
          ssh -T ubuntu@3.141.100.21 bash -s << 'EOF'
          set -euo pipefail

          echo "━━━ [1/5] Navigating to repo ━━━"
          cd ~/incident-monitoring-platform
          echo "  → pwd: $(pwd)"

          echo "━━━ [2/5] Fetching remote branches ━━━"
          git fetch origin

          echo "━━━ [3/5] Checking out ${{ steps.branch.outputs.branch }} ━━━"
          git checkout ${{ steps.branch.outputs.branch }}

          echo "━━━ [4/5] Pulling latest code ━━━"
          git pull origin ${{ steps.branch.outputs.branch }}
          echo "  → HEAD: $(git log -1 --oneline)"

          echo "━━━ [5/5] Rebuilding containers ━━━"
          docker compose down --remove-orphans
          docker compose up -d --build --progress plain
          echo "  → Running containers:"
          docker compose ps

          echo "━━━ Deployment complete ━━━"
          EOF

      - name: Close port 22 for this runner
        if: always()
        run: |
          echo "  → Revoking SSH access for ${{ steps.open-ssh.outputs.runner_ip }}"
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.open-ssh.outputs.runner_ip }}
          echo "  → Port 22 closed"
